<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Lei Ruins</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cinzel:wght@400;700&display=swap');

        :root {
            --blood-red: #c41e3a;
            --neon-red: #ff1a3c;
            --dark-metal: #1a1a1a;
            --deep-black: #0f0f0f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #2a0a0a 0%, #0f0f0f 70%);
            color: #eee;
            font-family: 'Cinzel', serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(196, 30, 58, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 80%, rgba(255, 26, 60, 0.12) 0%, transparent 60%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.8rem;
            font-weight: 700;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #fff, var(--neon-red), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 0 20px var(--neon-red),
                0 0 40px var(--blood-red),
                0 0 80px rgba(196, 30, 58, 0.6);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.2rem;
            letter-spacing: 5px;
            opacity: 0.85;
            color: #ccc;
            font-style: italic;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 820px;
            aspect-ratio: 16 / 9;
            border: 3px solid #333;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 
                0 0 60px rgba(196, 30, 58, 0.7),
                inset 0 0 40px rgba(0, 0, 0, 0.9),
                0 20px 40px rgba(0, 0, 0, 0.8);
            background: #000;
        }

        .video-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border: 2px solid var(--neon-red);
            border-radius: 12px;
            opacity: 0.4;
            z-index: 2;
            pointer-events: none;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 70%, rgba(15,15,15,0.85));
            z-index: 3;
            pointer-events: none;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 1.5rem;
        }

        .video-label {
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: #ddd;
            text-shadow: 0 0 15px var(--neon-red);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1100px;
        }

        .link-card {
            position: relative;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.6),
                0 0 30px rgba(196, 30, 58, 0.3);
        }

        .link-card:hover {
            transform: scale(1.08) translateY(-12px);
            box-shadow: 
                0 20px 50px rgba(196, 30, 58, 0.6),
                0 0 60px rgba(255, 26, 60, 0.5);
        }

        .link-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .link-card:hover img {
            transform: scale(1.12);
        }

        .link-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent, rgba(20, 0, 0, 0.85));
            display: flex;
            align-items: flex-end;
            padding: 1.8rem;
            transition: all 0.3s ease;
        }

        .link-card:hover .link-overlay {
            background: linear-gradient(transparent, rgba(196, 30, 58, 0.75));
        }

        .link-title {
            font-size: 1.28rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: white;
            text-shadow: 0 2px 10px black;
            line-height: 1.3;
        }

        footer {
            margin-top: 4rem;
            text-align: center;
            opacity: 0.6;
            font-size: 0.9rem;
        }

        .metallic-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-red), transparent);
            margin: 2rem auto;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>LOVE LEI RUINS</h1>
            <div class="subtitle">DARK DESIRE • ELEGANT RUIN</div>
            <div class="metallic-line"></div>
        </header>

        <div class="main-content">
            <!-- Central Video -->
            <div class="video-container">
                <video id="mainVideo" autoplay loop muted playsinline>
                    <source src="secret-loop.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="video-overlay">
                    <div class="video-label">ETERNAL LOOP • FOR LEI</div>
                </div>
            </div>

            <!-- Three Square Image Links -->
            <div class="links-grid">
                <!-- Link 1 - Two in One -->
                <div class="link-card" onclick="window.open('https://beyond-the-prompt.github.io/BREAKING-THE-PROMPT-WHORE-DASH-DELIVERY/index.html', '_blank')">
                    <img src="link1.jpg" alt="Trample House / WhoreDash">
                    <div class="link-overlay">
                        <div class="link-title">TRAMPLE HOUSE<br>WHOREDASH</div>
                    </div>
                </div>

                <!-- Link 2 -->
                <div class="link-card" onclick="window.open('https://only-us-lei-ruins-p5ymwbn9k-lei-ruins-projects.vercel.app/', '_blank')">
                    <img src="link2.jpg" alt="Only Us">
                    <div class="link-overlay">
                        <div class="link-title">ONLY US</div>
                    </div>
                </div>

                <!-- Link 3 -->
                <div class="link-card" onclick="window.open('https://lei-ruins.github.io/Lei-Ruins-Official-Hub/', '_blank')">
                    <img src="link3.jpg" alt="Lei Ruins Hub">
                    <div class="link-overlay">
                        <div class="link-title">LEI RUINS</div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>PRIVATE ACCESS • FORBIDDEN DESIRES • 18+</p>
        </footer>
    </div>

    <script>
        const video = document.getElementById('mainVideo');
        
        video.addEventListener('canplay', () => {
            video.play().catch(() => {});
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (video.paused) video.play();
                else video.pause();
            }
        });

        console.log('%cLove Lei Ruins initialized.', 'color:#ff1a3c; font-family:monospace;');
    </script>
</body>
</html>
